<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>untukk sayangg 🤍</title>
<link rel="stylesheet" href="mesaage1.css">
</head>
<body>

<div id="pageReveal"></div>

<div class="bg-stars"></div>

<main class="page">

    <section class="message-card">

        <h1>Untuk Bayii Mungill kikyyy 🤏🏻🤍</h1>

        <div id="typingWrapper">
            <div id="typing"></div>
            <span id="typingCursor">|</span>
        </div>

    </section>

    <section class="feature-grid">

        <button class="feature-btn" onclick="randomGombal()">
            Random Gombal 😋🤍
        </button>

        <button class="feature-btn" onclick="randomJoke()">
            Bikin Senyum ehee 🗿
        </button>

        <button class="feature-btn" onclick="virtualHug()">
            Peyukkk Virtual 🤏🏻
        </button>

        <button class="feature-btn" onclick="checkMood()">
            Mood sayangg 📊
        </button>

        <button class="feature-btn" onclick="checkCuteLevel()">
            Bayii mungill kikyyy Detector 🤍
        </button>

        <button class="feature-btn" onclick="openLetter()">
            Secret Letter 💌
        </button>

    </section>

    <!-- Mood Repair Meter -->
    <section class="meter-card">
        <h3>Mood Repair Meter</h3>

        <div class="meter-track">
            <div id="meterFill"></div>
        </div>

        <p id="meterText">Mood recovery: 0%</p>
    </section>

    <section id="resultBox">
        pencet tombol di atas yaa sayanggg 🤏🏻🤍
    </section>

    <section class="ending-section">
        <button class="final-btn" onclick="finalScene()">
    klik kalau Bayii mungill kikyyy udah senyum ehee 🤍
</button>
    </section>

</main>

<!-- Final Scene -->
<div id="finalSceneModal">
    <div class="final-card">
        <h2>maaciii yaa cantiii udaaa senyum 🤏🏻🤍</h2>
        <p>kikyy lebiii tenang sekarangggg ehee😋🤍</p>
        <small>i love you babyy 🤍</small>
    </div>
</div>

<!-- Secret Letter -->
<div id="letterModal">
    <div class="letter-card">
        <h2>untukk sayangg 🤍</h2>
        <p id="letterText"></p>
        <button onclick="closeLetter()">Tutup</button>
    </div>
</div>

<audio id="bgm2" loop>
    <source src="message3.mp3" type="audio/mpeg">
</audio>

<script src="message2.js"></script>

</body>
</html>
